
<!DOCTYPE html>
<html lang="en">
<body style="background-color: #0d0505;">
<div style="display:flex;flex-direction:row;align-items:flex-start;gap:0;font-family:'Courier New',monospace;width:100%;">
<div style="display:flex;flex-direction:column;width:100px;min-width:100px;background:#1a1a1a;border-right:1px solid #333;">
  <div style="color:#666;font-size:10px;letter-spacing:2px;text-align:center;padding:8px 0 4px;">WAVES</div>
  <div id="lock-ui" style="display:flex;flex-direction:column;align-items:center;gap:4px;padding:6px 4px;">
    <div style="color:#555;font-size:9px;text-align:center;line-height:1.5;">Password<br>to unlock</div>
    <input id="pw-input" type="password" maxlength="20"
      style="width:78px;background:#111;border:1px solid #333;color:#aaa;font-family:'Courier New',monospace;font-size:10px;padding:3px 4px;box-sizing:border-box;outline:none;"
      placeholder="password"/>
    <button id="pw-btn"
      style="width:82px;background:#1a1a1a;border:1px solid #444;color:#666;font-family:'Courier New',monospace;font-size:10px;padding:4px 0;cursor:pointer;">
      UNLOCK
    </button>
    <div id="pw-msg" style="color:#550000;font-size:9px;text-align:center;height:12px;"></div>
  </div>
  <div id="wave-btns" style="display:none;flex-direction:column;gap:3px;align-items:center;padding:4px 0;"></div>
</div>
<canvas id="c" style="display:block;cursor:crosshair;flex-shrink:0;"></canvas>
</div>
<style>
.wave-btn{width:82px;background:#222;border:1px solid #444;color:#777;font-family:'Courier New',monospace;font-size:11px;padding:5px 0;cursor:pointer;text-align:center;}
.wave-btn:hover{background:#3a1a00;border-color:#cc6600;color:#ffaa44;}
.wave-btn.active{background:#1a003a;border-color:#cc00ff;color:#ff88ff;font-weight:bold;}
.wave-btn.fungi{border-left:3px solid #6622aa;}
.wave-btn.electric{border-left:3px solid #0088aa;}
</style>
<script>
const CORRECT_PW='0l1v3r';
const lockUI=document.getElementById('lock-ui');
const waveBtnsContainer=document.getElementById('wave-btns');
const pwInput=document.getElementById('pw-input');
const pwBtn=document.getElementById('pw-btn');
const pwMsg=document.getElementById('pw-msg');
let panelUnlocked=false;

function lockPanel(){
  panelUnlocked=false;
  waveBtnsContainer.style.display='none';
  lockUI.style.display='flex';
  pwInput.value='';pwMsg.textContent='';
}
function tryUnlock(){
  if(pwInput.value===CORRECT_PW){
    panelUnlocked=true;lockUI.style.display='none';waveBtnsContainer.style.display='flex';buildWaveButtons();
  }else{pwMsg.textContent='incorrect';pwInput.value='';setTimeout(()=>pwMsg.textContent='',1500);}
}
pwBtn.addEventListener('click',tryUnlock);
pwInput.addEventListener('keydown',e=>{if(e.key==='Enter')tryUnlock();});

const canvas=document.getElementById('c');
const ctx=canvas.getContext('2d');
const W=canvas.width=700,H=canvas.height=560;
const WW=1800,WH=1400;
let camX=0,camY=0,camLerp=0.1;

const WAVE_INFO=[
  {label:'Wave 1',sub:'20 normal',cls:''},
  {label:'Wave 2',sub:'25+crate',cls:''},
  {label:'Wave 3',sub:'30 normal',cls:''},
  {label:'Wave 4',sub:'35+crate',cls:''},
  {label:'Wave 5',sub:'fungi',cls:'fungi'},
  {label:'Wave 6',sub:'45+crate',cls:'fungi'},
  {label:'Wave 7',sub:'electric',cls:'electric'},
  {label:'Wave 8',sub:'50+crate',cls:'electric'},
  {label:'Wave 9',sub:'50 mix',cls:'electric'},
  {label:'Wave 10',sub:'BOSS',cls:'electric'},
];
const waveButtons=[];
function buildWaveButtons(){
  waveBtnsContainer.innerHTML='';waveButtons.length=0;
  for(let i=0;i<10;i++){
    const info=WAVE_INFO[i];
    const btn=document.createElement('button');
    btn.className='wave-btn '+info.cls;
    btn.innerHTML=`<div style="font-weight:bold;font-size:13px;">${i+1}</div><div style="font-size:9px;color:#555;margin-top:1px;">${info.sub}</div>`;
    btn.addEventListener('click',()=>initAtWave(i+1));
    waveBtnsContainer.appendChild(btn);waveButtons.push(btn);
  }
}
function updateWaveButtons(){if(!panelUnlocked)return;waveButtons.forEach((b,i)=>b.classList.toggle('active',gameState==='playing'&&wave===i+1));}

const BOSS_DEATH_MSGS=[
  "The King's jaws closed around you like a vice.\nYou never even had time to scream.\nEvery bone folded inward under a thousand pounds.\nIt didn't even slow down. You were nothing to it.",
  "It caught you mid-run. One hand. That was all.\nThe pressure was total — cold, mechanical, absolute.\nThe last sound you heard was a sickening crunch.\nThen silence. Then darkness. Then nothing at all.",
  "The Mutant Zombie King didn't even stop moving.\nIt scooped you up mid-stride like a ragdoll.\nIts molars came together with terrible, grinding finality.\nYou were gone before the echo faded.",
  "You ran. It covered the distance in an instant.\nIts jaws locked around you like a car compactor.\nUnder a thousand pounds of rot and fury,\nyou were snuffed out like a candle in a storm.",
];

let gameState='title';
let player,zombies,bullets,particles,pickups,burnStacks;
let score,frameCount,wave,waveCleared,waveBanner;
let mouseX=W/2,mouseY=H/2,shakeX=0,shakeY=0,shakeDur=0;
const TOTAL_WAVES=10,NORMAL_SPEED=0.55,keys={};
let boss=null,bossIntro=false,bossIntroTimer=0,bossCraterStains=[],bossHole=null;
let ammoDropTimer=0,shotgunPickup=null;
let bossDS=false,bossDSFrame=0,bossDSMsg='';
const DS_FLICKER=150;

let dumpsters=[],cars=[],manholes=[],graffiti=[],cracks=[],darkTiles=[];
const GRAFFITI_TEXTS=['NO HOPE','RUN','DEAD END','ZONE X','HELP',"THEY'RE HERE","DON'T STOP",'LOST'];
const GRAFFITI_COLORS=['rgba(180,40,40,0.55)','rgba(40,100,40,0.5)','rgba(40,40,160,0.45)','rgba(160,100,0,0.5)','rgba(100,20,100,0.45)'];
const CAR_COLORS=['#5a5a5a','#4a3a2a','#3a4a3a','#4a4a5a','#6a4a2a','#3a3a4a'];

function rnd(a,b){return a+Math.random()*(b-a);}
function rndInt(a,b){return Math.floor(rnd(a,b+1));}
function dist(ax,ay,bx,by){return Math.hypot(bx-ax,by-ay);}
function shake(mag,dur){shakeX=(Math.random()-.5)*mag;shakeY=(Math.random()-.5)*mag;shakeDur=dur;}
function spawnP(x,y,color,count,speed,size){for(let i=0;i<count;i++){const a=Math.random()*Math.PI*2,sp=speed*(0.4+Math.random());particles.push({x,y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,life:1,color,size:size||2.5});}}
function spawnZap(x,y){for(let i=0;i<8;i++){const a=Math.random()*Math.PI*2;particles.push({x,y,vx:Math.cos(a)*(1.5+Math.random()*3),vy:Math.sin(a)*(1.5+Math.random()*3),life:1,color:Math.random()<0.5?'#44ccff':'#ccff44',size:1.8});}}
function spawnEmber(x,y){particles.push({x,y,vx:rnd(-0.8,0.8),vy:rnd(-2.5,-0.8),life:rnd(0.5,1),color:Math.random()<0.5?'#ff6600':'#ffaa00',size:rnd(1,2.5),isEmber:true});}
function spawnSmoke(x,y,color){particles.push({x,y,vx:rnd(-0.6,0.6),vy:rnd(-1.5,-0.4),life:rnd(0.6,1),color,size:rnd(5,12),isSmoke:true});}
function spawnCrack(x,y,angle){const len=rnd(30,85);const segs=[];let cx=x,cy=y;for(let i=0;i<5;i++){const a=angle+(Math.random()-.5)*0.6;cx+=Math.cos(a)*len/5+(Math.random()-.5)*8;cy+=Math.sin(a)*len/5+(Math.random()-.5)*8;segs.push({x:cx,y:cy});}return{ox:x,oy:y,segs,life:1};}

function showBossDeathScreen(){if(bossDS)return;bossDS=true;bossDSFrame=0;bossDSMsg=BOSS_DEATH_MSGS[rndInt(0,BOSS_DEATH_MSGS.length-1)];}
function goDead(){bossDS=false;gameState='dead';lockPanel();}
function goWin(){gameState='win';lockPanel();}

canvas.addEventListener('click',()=>{
  if(bossDS){if(bossDSFrame>DS_FLICKER+80)goDead();return;}
  if(gameState==='title'||gameState==='dead'||gameState==='win')initAtWave(1);
});
function clearKeys(){for(const k in keys)keys[k]=false;}
document.addEventListener('keydown',e=>{keys[e.code]=true;if(e.code==='KeyF'&&gameState==='playing'&&!bossDS)player.firingOn=!player.firingOn;if(['ArrowUp','ArrowDown','ArrowLeft','ArrowRight','Space'].includes(e.code))e.preventDefault();});
document.addEventListener('keyup',e=>{keys[e.code]=false;});
canvas.addEventListener('mousemove',e=>{const r=canvas.getBoundingClientRect();mouseX=(e.clientX-r.left)*(W/r.width);mouseY=(e.clientY-r.top)*(H/r.height);});

function initWorld(){
  dumpsters=[];cars=[];manholes=[];graffiti=[];cracks=[];darkTiles=[];bossCraterStains=[];bossHole=null;
  for(let i=0;i<120;i++)darkTiles.push({x:rnd(0,WW),y:rnd(0,WH),w:rnd(40,120),h:rnd(40,100),alpha:rnd(0.06,0.18)});
  for(let i=0;i<80;i++)cracks.push({x:rnd(0,WW),y:rnd(0,WH),len:rnd(20,70),a:rnd(0,Math.PI*2),alpha:rnd(0.15,0.3)});
  for(let i=0;i<18;i++)graffiti.push({x:rnd(60,WW-60),y:rnd(60,WH-60),text:GRAFFITI_TEXTS[rndInt(0,7)],color:GRAFFITI_COLORS[rndInt(0,4)],size:rndInt(14,28),a:rnd(-0.3,0.3)});
  for(let i=0;i<20;i++)manholes.push({x:rnd(80,WW-80),y:rnd(80,WH-80)});
  const cp=[];
  for(let i=0;i<22;i++){let cx,cy,att=0;do{cx=rnd(60,WW-60);cy=rnd(60,WH-60);att++;}while(att<30&&(dist(cx,cy,WW/2,WH/2)<300||cp.some(p=>dist(cx,cy,p.x,p.y)<80)));if(att<30){cp.push({x:cx,y:cy});cars.push({x:cx,y:cy,angle:Math.random()<0.5?0:Math.PI/2,color:CAR_COLORS[rndInt(0,5)],wrecked:Math.random()<0.4,w:38,h:20});}}
  const dc=rndInt(7,9);
  for(let i=0;i<dc;i++){let dx,dy,att=0;do{dx=rnd(80,WW-80);dy=rnd(80,WH-80);att++;}while(att<40&&(dist(dx,dy,WW/2,WH/2)<320||dumpsters.some(d=>dist(dx,dy,d.x,d.y)<120)||cars.some(c=>dist(dx,dy,c.x,c.y)<80)));if(att<40)dumpsters.push({x:dx,y:dy,r:18,flameR:28,flickOffset:Math.random()*100});}
}

function initAtWave(w){
  clearKeys();gameState='playing';bossDS=false;bossDSFrame=0;
  score=0;frameCount=0;wave=w;waveCleared=false;waveBanner=w===10?0:140;
  zombies=[];bullets=[];particles=[];pickups=[];burnStacks=[];
  boss=null;bossIntro=false;bossIntroTimer=0;ammoDropTimer=0;shotgunPickup=null;
  initWorld();
  player={x:WW/2-200,y:WH/2-200,r:13,hp:100,maxHp:100,ammo:500,fireRate:0,speed:3.2,firingOn:false,shockStacks:[],legAnim:0};
  if(w===10)startBossIntro();else spawnWave(w);
  updateWaveButtons();
}

function startBossIntro(){bossIntro=true;bossIntroTimer=260;camLerp=0.03;}
function spawnBoss(){
  bossIntro=false;camLerp=0.1;
  const bx=WW/2,by=WH/2;bossHole={x:bx,y:by,r:58};
  for(let i=0;i<40;i++){const a=Math.random()*Math.PI*2,r=rnd(55,200);bossCraterStains.push({x:bx+Math.cos(a)*r,y:by+Math.sin(a)*r,r:rnd(8,32),alpha:rnd(0.25,0.55),type:Math.random()<0.5?'dirt':'dark'});}
  boss={x:bx,y:by,r:45,hp:300,maxHp:300,angle:0,speed:0.85,anim:0,flickerTimer:0,
    slashCooldown:0,slashActive:false,slashTimer:0,slashAngle:0,slashArcProgress:0,slashHitPlayer:false,
    spawnCooldown:0,spawnActive:false,spawnTimer:0,spawnTick:0,spawnTotal:0,spawnedZombieIds:[],
    slamCooldown:0,slamPhase:null,slamTimer:0,slamJumpY:0,slamRings:[],slamCracks:[],slamHitPlayer:false,
    dashCooldown:0,dashActive:false,dashTimer:0,dashVx:0,dashVy:0,dashTrail:[],
    dead:false,deathTimer:0,eyeGlowBoost:0};
  ammoDropTimer=frameCount+3600;
}

function zombiesForWave(w){return Math.min(50,20+(w-1)*5);}
function spawnWave(w){
  waveCleared=false;waveBanner=140;
  const total=zombiesForWave(w);
  if(w===5){for(let i=0;i<20;i++)spawnNormal();for(let i=0;i<20;i++)spawnFungi();}
  else if(w<5){for(let i=0;i<total;i++)spawnNormal();}
  else if(w<7){const fc=Math.floor(total*0.4);for(let i=0;i<total-fc;i++)spawnNormal();for(let i=0;i<fc;i++)spawnFungi();}
  else{const fc=Math.floor(total*0.3),ec=Math.floor(total*0.25);for(let i=0;i<total-fc-ec;i++)spawnNormal();for(let i=0;i<fc;i++)spawnFungi();for(let i=0;i<ec;i++)spawnElectric();}
  if(w%2===0)spawnCrate('medkit');
}
function edgeSpawn(){const s=Math.floor(Math.random()*4);if(s===0)return{x:Math.random()*WW,y:-30};if(s===1)return{x:WW+30,y:Math.random()*WH};if(s===2)return{x:Math.random()*WW,y:WH+30};return{x:-30,y:Math.random()*WH};}
let zid=0;
function spawnNormal(){const{x,y}=edgeSpawn();zombies.push({id:zid++,x,y,r:10,hp:2,maxHp:2,speed:NORMAL_SPEED,type:'normal',flickerTimer:0,anim:Math.random()*100,skinTone:rndInt(0,3)});}
function spawnFungi(){const{x,y}=edgeSpawn();zombies.push({id:zid++,x,y,r:12,hp:4,maxHp:4,speed:NORMAL_SPEED*0.5,type:'fungi',flickerTimer:0,anim:Math.random()*100,sporeAngle:Math.random()*Math.PI*2,skinTone:rndInt(0,3)});}
function spawnElectric(){const{x,y}=edgeSpawn();zombies.push({id:zid++,x,y,r:9,hp:1,maxHp:1,speed:NORMAL_SPEED*2,type:'electric',flickerTimer:0,lastHit:-999,anim:Math.random()*100,skinTone:rndInt(0,3)});}
function spawnFungiNearBoss(){if(!boss)return;const a=Math.random()*Math.PI*2,r=boss.r+80+Math.random()*60;const id=zid++;zombies.push({id,x:boss.x+Math.cos(a)*r,y:boss.y+Math.sin(a)*r,r:12,hp:4,maxHp:4,speed:NORMAL_SPEED*0.5,type:'fungi',flickerTimer:0,anim:Math.random()*100,sporeAngle:Math.random()*Math.PI*2,skinTone:rndInt(0,3)});boss.spawnedZombieIds.push(id);}
function spawnCrate(t){let cx,cy;do{cx=80+Math.random()*(WW-160);cy=80+Math.random()*(WH-160);}while(dist(cx,cy,player.x,player.y)<200);pickups.push({x:cx,y:cy,type:t,r:13});}
function killBossSpawnedZombies(){if(!boss)return;const ids=new Set(boss.spawnedZombieIds);for(let i=zombies.length-1;i>=0;i--){if(ids.has(zombies[i].id)){spawnP(zombies[i].x,zombies[i].y,'#aa44ff',10,3,2.5);zombies.splice(i,1);}}}
function toCarLocal(px,py,car){const cos=Math.cos(-car.angle),sin=Math.sin(-car.angle),dx=px-car.x,dy=py-car.y;return{lx:dx*cos-dy*sin,ly:dx*sin+dy*cos};}
function collidesWithCar(px,py,r){for(const c of cars){const{lx,ly}=toCarLocal(px,py,c);if(Math.abs(lx)<c.w/2+r&&Math.abs(ly)<c.h/2+r)return true;}return false;}
function resolveCarCollision(px,py,r){let ox=0,oy=0;for(const c of cars){const{lx,ly}=toCarLocal(px,py,c);const hw=c.w/2+r,hh=c.h/2+r;if(Math.abs(lx)<hw&&Math.abs(ly)<hh){const ovX=hw-Math.abs(lx),ovY=hh-Math.abs(ly);let plx=0,ply=0;if(ovX<ovY)plx=ovX*Math.sign(lx);else ply=ovY*Math.sign(ly);const cos=Math.cos(c.angle),sin=Math.sin(c.angle);ox+=plx*cos-ply*sin;oy+=plx*sin+ply*cos;}}return{ox,oy};}
function worldMouse(){return{wx:mouseX+camX,wy:mouseY+camY};}
function updateCamera(){if(bossIntro){const tx=WW/2-W/2,ty=WH/2-H/2;camX+=(tx-camX)*0.03;camY+=(ty-camY)*0.03;}else{const tx=player.x-W/2,ty=player.y-H/2;camX+=(tx-camX)*camLerp;camY+=(ty-camY)*camLerp;}camX=Math.max(0,Math.min(WW-W,camX));camY=Math.max(0,Math.min(WH-H,camY));}
function playerDied(){if(wave===10&&!bossDS)showBossDeathScreen();else{gameState='dead';lockPanel();}}

function updateBoss(){
  if(!boss)return;boss.anim+=0.07;boss.flickerTimer=Math.max(0,boss.flickerTimer-1);boss.eyeGlowBoost=Math.max(0,boss.eyeGlowBoost-0.04);
  if(boss.dead){boss.deathTimer++;if(boss.deathTimer===5)killBossSpawnedZombies();if(boss.deathTimer===130&&!shotgunPickup)shotgunPickup={x:boss.x+70,y:boss.y+25,r:16};return;}
  if(frameCount>=ammoDropTimer&&ammoDropTimer>0){ammoDropTimer=frameCount+3600;const a=Math.random()*Math.PI*2;pickups.push({x:player.x+Math.cos(a)*90,y:player.y+Math.sin(a)*90,type:'ammo80',r:13});}
  const ddx=player.x-boss.x,ddy=player.y-boss.y;const dtp=Math.hypot(ddx,ddy);const atp=Math.atan2(ddy,ddx);
  let da=atp-boss.angle;while(da>Math.PI)da-=Math.PI*2;while(da<-Math.PI)da+=Math.PI*2;boss.angle+=da*0.04;
  if(boss.slamPhase==='windup'){boss.slamTimer--;boss.eyeGlowBoost=1;boss.slamJumpY=Math.min(55,boss.slamJumpY+5.5);if(boss.slamTimer<=0){boss.slamPhase='hover';boss.slamTimer=40;shake(3,3);}return;}
  if(boss.slamPhase==='hover'){boss.slamTimer--;boss.eyeGlowBoost=1;boss.slamJumpY=55+Math.sin(frameCount*0.35)*3;if(frameCount%5===0)spawnSmoke(boss.x+(Math.random()-.5)*50,boss.y-boss.slamJumpY+(Math.random()-.5)*20,'rgba(130,60,220,0.5)');if(boss.slamTimer<=0){boss.slamPhase='crash';boss.slamTimer=12;}return;}
  if(boss.slamPhase==='crash'){boss.slamTimer--;boss.eyeGlowBoost=1;boss.slamJumpY=Math.max(0,boss.slamJumpY*0.45);if(boss.slamTimer<=0){boss.slamPhase=null;boss.slamJumpY=0;shake(20,16);for(let i=0;i<10;i++){const ca=i/10*Math.PI*2;boss.slamCracks.push(spawnCrack(boss.x,boss.y,ca));}boss.slamRings.push({x:boss.x,y:boss.y,r:0,maxR:165,age:0});for(let i=0;i<35;i++)spawnP(boss.x+(Math.random()-.5)*90,boss.y+(Math.random()-.5)*90,Math.random()<0.5?'#44ccff':'#aa44ff',4,5,3);for(let i=0;i<18;i++)spawnZap(boss.x+(Math.random()-.5)*150,boss.y+(Math.random()-.5)*150);}return;}
  boss.slamRings=boss.slamRings.filter(ring=>{ring.r+=7;ring.age++;const rd=dist(player.x,player.y,ring.x,ring.y);if(rd<ring.r+12&&rd>ring.r-22&&!boss.slamHitPlayer){boss.slamHitPlayer=true;player.hp-=5;shake(7,5);player.shockStacks.push({remaining:300,nextTick:frameCount+120,dmgPerTick:3,tickInterval:120});}return ring.r<ring.maxR+20;});
  boss.slamCracks=boss.slamCracks.filter(c=>{c.life-=0.007;return c.life>0;});
  if(boss.dashActive){boss.dashTimer--;boss.x+=boss.dashVx;boss.y+=boss.dashVy;const{ox,oy}=resolveCarCollision(boss.x,boss.y,boss.r);boss.x+=ox;boss.y+=oy;boss.x=Math.max(boss.r,Math.min(WW-boss.r,boss.x));boss.y=Math.max(boss.r,Math.min(WH-boss.r,boss.y));boss.dashTrail.push({x:boss.x,y:boss.y,life:1});if(frameCount%2===0){spawnP(boss.x,boss.y,'#44ccff',3,2.5,2);spawnZap(boss.x+(Math.random()-.5)*30,boss.y+(Math.random()-.5)*30);}if(dist(boss.x,boss.y,player.x,player.y)<boss.r+player.r){player.hp-=8;shake(8,6);spawnZap(player.x,player.y);if(player.hp<=0){playerDied();return;}}if(boss.dashTimer<=0){boss.dashActive=false;boss.dashTrail=[];}return;}
  boss.dashTrail=boss.dashTrail.filter(t=>{t.life-=0.08;return t.life>0;});
  if(boss.slashActive){boss.slashTimer--;boss.eyeGlowBoost=1;boss.slashArcProgress=Math.min(1,boss.slashArcProgress+0.055);const slashNow=boss.slashAngle-0.9+boss.slashArcProgress*1.8;const rdist=dist(player.x,player.y,boss.x,boss.y);const rangle=Math.atan2(player.y-boss.y,player.x-boss.x);let adiff=rangle-slashNow;while(adiff>Math.PI)adiff-=Math.PI*2;while(adiff<-Math.PI)adiff+=Math.PI*2;if(Math.abs(adiff)<0.4&&rdist<boss.r+175&&!boss.slashHitPlayer){boss.slashHitPlayer=true;player.hp-=45;shake(14,10);spawnP(player.x,player.y,'#cc0055',18,4,3);if(player.hp<=0){playerDied();return;}}if(frameCount%2===0){const sx=boss.x+Math.cos(slashNow)*(boss.r+100),sy=boss.y+Math.sin(slashNow)*(boss.r+100);spawnP(sx,sy,'#dd22ff',4,2.5,3);}if(boss.slashTimer<=0)boss.slashActive=false;return;}

function update(){
  if(bossDS)return;
  frameCount++;if(waveBanner>0)waveBanner--;
  if(bossIntro){bossIntroTimer--;updateCamera();if(bossIntroTimer<=0)spawnBoss();return;}
  const moving=keys['ArrowLeft']||keys['KeyA']||keys['ArrowRight']||keys['KeyD']||keys['ArrowUp']||keys['KeyW']||keys['ArrowDown']||keys['KeyS'];
  if(moving)player.legAnim+=0.18;
  let mx=0,my=0;
  if(keys['ArrowLeft']||keys['KeyA'])mx-=1;if(keys['ArrowRight']||keys['KeyD'])mx+=1;
  if(keys['ArrowUp']||keys['KeyW'])my-=1;if(keys['ArrowDown']||keys['KeyS'])my+=1;
  if(mx&&my){mx*=0.707;my*=0.707;}
  let nx=Math.max(player.r,Math.min(WW-player.r,player.x+mx*player.speed));
  let ny=Math.max(player.r,Math.min(WH-player.r,player.y+my*player.speed));
  const{ox:pox,oy:poy}=resolveCarCollision(nx,ny,player.r);
  player.x=Math.max(player.r,Math.min(WW-player.r,nx+pox));
  player.y=Math.max(player.r,Math.min(WH-player.r,ny+poy));
  if(bossHole&&dist(player.x,player.y,bossHole.x,bossHole.y)<bossHole.r-10){gameState='dead';lockPanel();return;}
  updateCamera();
  for(const d of dumpsters){if(dist(player.x,player.y,d.x,d.y)<d.flameR){if(!player.lastBurnCheck||frameCount-player.lastBurnCheck>=60){player.lastBurnCheck=frameCount;burnStacks.push({remaining:300,nextTick:frameCount+60});spawnP(player.x,player.y,'#ff4400',6,2,2);}}if(frameCount%4===0)spawnEmber(d.x+rnd(-8,8),d.y-14);}
  burnStacks=burnStacks.filter(s=>{s.remaining--;if(s.remaining<=0)return false;if(frameCount>=s.nextTick){player.hp-=2;s.nextTick+=60;if(player.hp<=0){playerDied();return false;}}return true;});
  player.shockStacks=player.shockStacks.filter(s=>{s.remaining--;if(s.remaining<=0)return false;const ti=s.tickInterval||60,dmg=s.dmgPerTick||1;if(frameCount>=s.nextTick){player.hp-=dmg;s.nextTick+=ti;spawnZap(player.x+(Math.random()-.5)*12,player.y+(Math.random()-.5)*12);if(player.hp<=0){playerDied();return false;}}return true;});
  const{wx,wy}=worldMouse();player.fireRate--;
  if(player.firingOn&&player.fireRate<=0&&player.ammo>0){player.fireRate=18;player.ammo--;const a=Math.atan2(wy-player.y,wx-player.x);bullets.push({x:player.x,y:player.y,vx:Math.cos(a)*14,vy:Math.sin(a)*14,life:90,angle:a});for(let i=0;i<4;i++){const sa=a+(Math.random()-.5)*0.4;particles.push({x:player.x+Math.cos(a)*16,y:player.y+Math.sin(a)*16,vx:Math.cos(sa)*4,vy:Math.sin(sa)*4,life:0.5,color:Math.random()<0.5?'#ffaa00':'#ffee44',size:1.5+Math.random()*2});}shake(1.5,3);}
  bullets=bullets.filter(b=>{b.x+=b.vx;b.y+=b.vy;b.life--;if(b.life<=0||b.x<0||b.x>WW||b.y<0||b.y>WH)return false;if(collidesWithCar(b.x,b.y,2)){spawnP(b.x,b.y,'#aaa',3,1.5,2);return false;}if(boss&&!boss.dead&&dist(b.x,b.y,boss.x,boss.y)<boss.r){boss.hp--;boss.flickerTimer=4;spawnP(b.x,b.y,Math.random()<0.5?'#cc44ff':'#44ccff',3,2,2);return false;}for(let i=zombies.length-1;i>=0;i--){const z=zombies[i];if(dist(b.x,b.y,z.x,z.y)<z.r){z.hp--;z.flickerTimer=6;const pc=z.type==='fungi'?'#cc44ff':z.type==='electric'?'#44ccff':'#8b1a1a';spawnP(b.x,b.y,pc,5,2,2);if(z.hp<=0){score+=(z.type==='fungi'?30:z.type==='electric'?25:10)*wave;spawnP(z.x,z.y,pc,14,3,2.5);if(z.type==='electric')spawnZap(z.x,z.y);zombies.splice(i,1);}return false;}}return true;});
  for(const z of zombies){z.anim+=(z.type==='electric'?0.28:z.type==='fungi'?0.06:0.12);const ta=Math.atan2(player.y-z.y,player.x-z.x);let zx=z.x+Math.cos(ta)*z.speed,zy=z.y+Math.sin(ta)*z.speed;const{ox,oy}=resolveCarCollision(zx,zy,z.r);zx+=ox;zy+=oy;if(collidesWithCar(zx,zy,z.r)){const px2=z.x+Math.cos(ta)*z.speed,py2=z.y+Math.sin(ta)*z.speed;const{ox:ox2,oy:oy2}=resolveCarCollision(px2,z.y,z.r);const{ox:ox3,oy:oy3}=resolveCarCollision(z.x,py2,z.r);if(!collidesWithCar(px2+ox2,z.y+oy2,z.r)){zx=px2+ox2;zy=z.y+oy2;}else if(!collidesWithCar(z.x+ox3,py2+oy3,z.r)){zx=z.x+ox3;zy=py2+oy3;}else{const perp=ta+Math.PI/2*(z.steerSide||1);zx=z.x+Math.cos(perp)*z.speed;zy=z.y+Math.sin(perp)*z.speed;const{ox:ox4,oy:oy4}=resolveCarCollision(zx,zy,z.r);zx+=ox4;zy+=oy4;}}if(!z.steerSide)z.steerSide=Math.random()<0.5?1:-1;if(frameCount%60===0)z.steerSide*=-1;z.x=Math.max(z.r,Math.min(WW-z.r,zx));z.y=Math.max(z.r,Math.min(WH-z.r,zy));z.flickerTimer=Math.max(0,(z.flickerTimer||0)-1);if(z.type==='fungi')z.sporeAngle=(z.sporeAngle||0)+0.02;

  updateBoss();
  pickups=pickups.filter(p=>{if(dist(p.x,p.y,player.x,player.y)<p.r+player.r){if(p.type==='medkit'){player.hp=Math.min(player.maxHp,player.hp+30);player.ammo+=200;spawnP(p.x,p.y,'#00ff88',16,3,2.5);}else if(p.type==='ammo80'){player.ammo+=80;spawnP(p.x,p.y,'#ffcc00',12,3,2.5);}return false;}return true;});

function drawBossDeathScreen(){

  if(t<DS_FLICKER){
    if(t<90){if((t%5)<2||(t%7)<3){ctx.fillStyle='#000';ctx.fillRect(0,0,W,H);}ctx.fillStyle=`rgba(80,0,0,${Math.sin(t*0.4)*0.3+0.2})`;ctx.fillRect(0,0,W,H);for(let i=0;i<8;i++){ctx.fillStyle=`rgba(${rndInt(0,60)},0,0,0.4)`;ctx.fillRect(0,rndInt(0,H),W,rndInt(1,4));}}

  }else{

    ctx.beginPath();ctx.moveTo(W/2-215,H/2+58);ctx.lineTo(W/2+215,H/2+58);ctx.stroke();
    if(t>DS_FLICKER+80){ctx.globalAlpha=ta*Math.min(1,(t-DS_FLICKER-80)/30);ctx.fillStyle='#550000';ctx.font='bold 11px Courier New';ctx.fillText('click to continue',W/2,H/2+84);}
    ctx.restore();ctx.textAlign='left';

function adjustBrightness(hex,amt){const r=Math.max(0,Math.min(255,parseInt(hex.slice(1,3),16)+amt));const g=Math.max(0,Math.min(255,parseInt(hex.slice(3,5),16)+amt));const b=Math.max(0,Math.min(255,parseInt(hex.slice(5,7),16)+amt));return`#${r.toString(16).padStart(2,'0')}${g.toString(16).padStart(2,'0')}${b.toString(16).padStart(2,'0')}`;}
function drawBolt(x1,y1,x2,y2,segs,color,lw){ctx.strokeStyle=color;ctx.lineWidth=lw||1.5;ctx.beginPath();ctx.moveTo(x1,y1);for(let i=1;i<segs;i++){const t=i/segs;ctx.lineTo(x1+(x2-x1)*t+(Math.random()-.5)*10,y1+(y2-y1)*t+(Math.random()-.5)*10);}ctx.lineTo(x2,y2);ctx.stroke();}

function drawArena(){ctx.fillStyle='#888';ctx.fillRect(0,0,W,H);const ox=-camX,oy=-camY;ctx.save();ctx.translate(ox,oy);ctx.fillStyle='#b8b8b4';ctx.fillRect(0,0,WW,WH);ctx.strokeStyle='rgba(100,100,95,0.25)';ctx.lineWidth=1;for(let x=0;x<=WW;x+=80){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,WH);ctx.stroke();}for(let y=0;y<=WH;y+=80){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(WW,y);ctx.stroke();}for(const t of darkTiles){ctx.fillStyle=`rgba(80,80,76,${t.alpha})`;ctx.fillRect(t.x,t.y,t.w,t.h);}for(const c of cracks){ctx.save();ctx.globalAlpha=c.alpha;ctx.strokeStyle='#7a7a72';ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(c.x,c.y);let cx2=c.x,cy2=c.y;for(let s=0;s<3;s++){const tt=(s+1)/3;cx2=c.x+Math.cos(c.a+s*0.4)*c.len*tt+(Math.random()-.5)*6;cy2=c.y+Math.sin(c.a+s*0.4)*c.len*tt+(Math.random()-.5)*6;ctx.lineTo(cx2,cy2);}ctx.stroke();ctx.restore();}for(const g of graffiti){ctx.save();ctx.translate(g.x,g.y);ctx.rotate(g.a);ctx.globalAlpha=0.75;ctx.fillStyle=g.color;ctx.font=`bold ${g.size}px Arial`;ctx.textAlign='center';ctx.fillText(g.text,0,0);ctx.restore();}for(const m of manholes){ctx.fillStyle='#888880';ctx.beginPath();ctx.arc(m.x,m.y,16,0,Math.PI*2);ctx.fill();ctx.fillStyle='#7a7a72';ctx.beginPath();ctx.arc(m.x,m.y,14,0,Math.PI*2);ctx.fill();ctx.strokeStyle='#6a6a62';ctx.lineWidth=1.5;ctx.beginPath();ctx.moveTo(m.x-13,m.y);ctx.lineTo(m.x+13,m.y);ctx.stroke();ctx.beginPath();ctx.moveTo(m.x,m.y-13);ctx.lineTo(m.x,m.y+13);ctx.stroke();}for(const s of bossCraterStains){ctx.save();ctx.globalAlpha=s.alpha;ctx.fillStyle=s.type==='dark'?'#2a1a0a':'#6a4a2a';ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,Math.PI*2);ctx.fill();ctx.restore();}if(bossHole){ctx.fillStyle='#0a0500';ctx.beginPath();ctx.arc(bossHole.x,bossHole.y,bossHole.r,0,Math.PI*2);ctx.fill();ctx.strokeStyle='#3a1a00';ctx.lineWidth=6;ctx.beginPath();ctx.arc(bossHole.x,bossHole.y,bossHole.r,0,Math.PI*2);ctx.stroke();ctx.fillStyle='rgba(180,0,0,0.55)';ctx.font='bold 10px Courier New';ctx.textAlign='center';ctx.fillText(' function drawHUD(){ctx.fillStyle='rgba(20,20,20,0.78)';ctx.beginPath();ctx.roundRect(8,8,190,110,6);ctx.fill();ctx.fillStyle='#2a0000';ctx.beginPath();ctx.roundRect(14,16,120,13,3);ctx.fill();const hpPct=Math.max(0,player.hp)/player.maxHp;ctx.fillStyle=hpPct>0.5?'hsl(120,65%,32%)':'hsl('+(hpPct*120)+',65%,32%)';ctx.beginPath();ctx.roundRect(14,16,120*hpPct,13,3);ctx.fill();ctx.strokeStyle='rgba(255,255,255,0.07)';ctx.lineWidth=1;ctx.beginPath();ctx.roundRect(14,16,120,13,3);ctx.stroke();ctx.fillStyle='#ddd';ctx.font='bold 9px Courier New';ctx.fillText(`HP  ${Math.max(0,player.hp)} / 100`,18,26);let yy=38;const stacks=player.shockStacks.length,burns=burnStacks.length;if(stacks>0){ctx.fillStyle='#44ddff';ctx.font='bold 9px Courier New';ctx.fillText(`SHOCKED x${stacks}`,14,yy);yy+=13;}if(burns>0){ctx.fillStyle='#ff8844';ctx.font='bold 9px Courier New';ctx.fillText(`BURNING x${burns}`,14,yy);yy+=13;}ctx.fillStyle='#cc9900';ctx.font='10px Courier New';ctx.fillText(`AMMO  ${player.ammo}`,14,yy);yy+=13;ctx.fillStyle=player.firingOn?'#ff5500':'#555';ctx.font='bold 10px Courier New';ctx.fillText(player.firingOn?'[ F ]  FIRING':'[ F ]  FIRE OFF',14,yy);yy+=13;ctx.fillStyle='#4a7a4a';ctx.font='10px Courier New';ctx.fillText(`ZOMBIES  ${zombies.length}`,14,yy);ctx.textAlign='right';ctx.fillStyle='rgba(20,20,20,0.72)';ctx.beginPath();ctx.roundRect(W-140,8,132,52,6);ctx.fill();ctx.fillStyle='#cc4400';ctx.font='bold 14px Courier New';ctx.fillText(`WAVE ${wave}/${TOTAL_WAVES}`,W-12,27);ctx.fillStyle='#888';ctx.font='11px Courier New';ctx.fillText(`SCORE  ${score}`,W-12,46);ctx.textAlign='left';drawMinimap();}
function drawBossIntroScreen(){ctx.fillStyle='rgba(0,0,0,0.72)';ctx.fillRect(0,0,W,H);const t=1-bossIntroTimer/260;ctx.save();ctx.globalAlpha=Math.min(1,t*2.5);ctx.fillStyle='#aa44ff';ctx.font='bold 30px Courier New';ctx.textAlign='center';ctx.fillText('WAVE 10',W/2,H/2-60);ctx.fillStyle='#ff2200';ctx.font='bold 22px Courier New';ctx.fillText('MUTANT ZOMBIE KING',W/2,H/2-18);ctx.fillStyle='#888';ctx.font='12px Courier New';ctx.fillText('rises from the earth...',W/2,H/2+16);ctx.restore();ctx.textAlign='left';}
function drawWaveBanner(){if(waveBanner<=0)return;const alpha=Math.min(1,waveBanner/30);ctx.save();ctx.globalAlpha=alpha;ctx.fillStyle='rgba(15,15,15,0.88)';ctx.beginPath();ctx.roundRect(W/2-170,H/2-52,340,86,8);ctx.fill();ctx.fillStyle='#cc4400';ctx.font='bold 26px Courier New';ctx.textAlign='center';ctx.fillText(`WAVE ${wave}`,W/2,H/2-14);ctx.fillStyle='#888';ctx.font='11px Courier New';const total=zombiesForWave(wave);let desc=`${total} ZOMBIES`;if(wave===5)desc='20 NORMAL + 20 FUNGI';else if(wave===6)desc+=` | FUNGI MIX`;else if(wave===7)desc+=` | ELECTRIC`;else if(wave>=8)desc+=` | ALL TYPES`;ctx.fillText(desc,W/2,H/2+16);ctx.textAlign='left';ctx.restore();}
function drawTitle(){ctx.fillStyle='#b0b0ac';ctx.fillRect(0,0,W,H);ctx.fillStyle='#222';ctx.font='bold 44px Courier New';ctx.textAlign='center';ctx.fillText('DEAD ZONE',W/2,H/2-80);ctx.fillStyle='#555';ctx.font='12px Courier New';ctx.fillText('ZOMBIE SURVIVAL  —  10 WAVES',W/2,H/2-50);ctx.fillText('WASD/ARROWS move  |  MOUSE aim  |  F fire',W/2,H/2-22);ctx.fillStyle='#336622';ctx.fillText('normal | fungi (wave 5+) | electric (wave 7+)',W/2,H/2+4);ctx.fillStyle='#aa44ff';ctx.fillText('WAVE 10 — face the MUTANT ZOMBIE KING',W/2,H/2+28);ctx.fillStyle='#00aa44';ctx.fillText('crate every 2 waves: +30 HP, +200 ammo',W/2,H/2+52);ctx.fillStyle='#cc3300';ctx.font='bold 13px Courier New';ctx.fillText('CLICK TO START',W/2,H/2+86);ctx.textAlign='left';}
function drawDead(){ctx.fillStyle='rgba(15,5,5,0.96)';ctx.fillRect(0,0,W,H);ctx.fillStyle='#880000';ctx.font='bold 42px Courier New';ctx.textAlign='center';ctx.fillText('YOU DIED',W/2,H/2-60);ctx.fillStyle='#555';ctx.font='15px Courier New';ctx.fillText(`Wave  ${wave} / ${TOTAL_WAVES}`,W/2,H/2-14);ctx.fillText(`Score  ${score}`,W/2,H/2+14);ctx.fillStyle='#888';ctx.font='12px Courier New';ctx.fillText('enter password to skip to a wave',W/2,H/2+44);ctx.fillStyle='#cc3300';ctx.font='bold 12px Courier New';ctx.fillText('CLICK TO RETRY FROM WAVE 1',W/2,H/2+70);ctx.textAlign='left';}
function drawWin(){ctx.fillStyle='rgba(8,2,20,0.97)';ctx.fillRect(0,0,W,H);ctx.fillStyle='#aa44ff';ctx.font='bold 32px Courier New';ctx.textAlign='center';ctx.fillText('MUTANT ZOMBIE KING SLAIN!',W/2,H/2-70);ctx.fillStyle='#ffcc00';ctx.font='bold 22px Courier New';ctx.fillText('YOU WIN!',W/2,H/2-28);ctx.fillStyle='#888';ctx.font='15px Courier New';ctx.fillText(`Final Score  ${score}`,W/2,H/2+12);ctx.fillStyle='#cc3300';ctx.font='bold 12px Courier New';ctx.fillText('CLICK TO PLAY AGAIN',W/2,H/2+60);ctx.textAlign='left';}

function drawGameWorld(){
  ctx.save();if(shakeDur>0)ctx.translate(shakeX,shakeY);
  drawArena();drawPickups();drawParticles();drawBullets();drawDumpsterFires();
  const dl=[...zombies.map(z=>({z,y:z.y}))];dl.sort((a,b)=>a.y-b.y);
  for(const{z}of dl){if(z.type==='normal')drawNormalZombie(z);else if(z.type==='fungi')drawFungiZombie(z);else drawElectricZombie(z);}
  for(const z of zombies){if(!onScreen(z.x,z.y,20))continue;const{sx,sy}=toScreen(z.x,z.y);const bw=z.r*2;ctx.fillStyle='#3a0000';ctx.fillRect(sx-z.r,sy-z.r-11,bw,4);ctx.fillStyle=z.type==='fungi'?'#bb44ff':z.type==='electric'?'#44ddff':'#44bb22';ctx.fillRect(sx-z.r,sy-z.r-11,bw*(z.hp/z.maxHp),4);}
  drawBoss();drawShotgunPickup();drawPlayer();drawHUD();
  if(boss)drawBossHUD();
  if(bossIntro)drawBossIntroScreen();
  drawWaveBanner();
  ctx.restore();
}

function loop(){
  requestAnimationFrame(loop);
  if(bossDS){bossDSFrame++;drawGameWorld();drawBossDeathScreen();return;}
  if(gameState==='title'){drawTitle();return;}
  if(gameState==='dead'){drawDead();return;}
  if(gameState==='win'){drawWin();return;}
  update();drawGameWorld();
}
loop();
</script>
</body>
</html>
